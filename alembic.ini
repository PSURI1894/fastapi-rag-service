# Alembic configuration. The database URL is NOT hard-coded here — alembic/env.py
# reads it from the app's settings (DATABASE_URL), so migrations target the same
# database the app uses. Run migrations with:  uv run alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = .
# Use OS-native path separators for version files.
version_path_separator = os

# --- logging (required by alembic/env.py's fileConfig call) ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
